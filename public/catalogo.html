<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo · jldv1508</title>
  <link rel="stylesheet" href="/styles.css?v=20260708-cleanup">
</head>
<body data-catalog-title="Catálogo unificado" data-catalog-url="/api/catalogo-publico" data-public-storage-key="jldv1508PublicCatalogConchasV1" data-empty-title="Catálogo en preparación" data-empty-text="Todavía no hay piezas visibles en este catálogo.">
  <header>
    <div class="brand-row">
      <a class="home-logo" href="/">jldv1508</a>
      <div class="brand-actions">
        <span class="visible-count" id="visibleCount">Cargando...</span>
        <a class="catalog-edit" href="/edicion">Editar</a>
      </div>
    </div>
    <h1>Catálogo</h1>
    <div class="controls">
      <input id="search" type="search" placeholder="Buscar por código, tipo, material o color" autocomplete="off">
      <select id="sortOrder" aria-label="Ordenar catálogo">
        <option value="original">Orden original</option>
        <option value="name">Nombre</option>
        <option value="type">Tipo</option>
        <option value="material">Material</option>
        <option value="color">Color</option>
      </select>
      <button id="filterToggle" class="filter-toggle-button" type="button" aria-expanded="false" aria-controls="filterPanel">Filtros</button>
      <button id="clearFilters" type="button">Limpiar</button>
    </div>
  </header>
  <section class="catalog-shell">
    <button class="filter-panel-backdrop" id="filterPanelBackdrop" type="button" hidden aria-label="Cerrar filtros"></button>
    <aside class="filter-panel" aria-label="Filtros del catálogo" id="filterPanel">
      <div class="filter-panel-head">
        <strong>Filtros</strong>
        <div class="filter-panel-head-actions">
          <span id="filterStateSummary">Sin filtros</span>
          <button id="filterClose" class="filter-close-button" type="button" aria-label="Cerrar filtros">Cerrar</button>
        </div>
      </div>
      <section class="filter-multi-group" aria-labelledby="typeGroupTitle">
        <div class="filter-chip-group-head">
          <strong id="typeGroupTitle">Tipo</strong>
          <span id="typeGroupMeta">Todas</span>
        </div>
        <div class="filter-toggle-grid" id="typeFilterChips"></div>
      </section>
      <section class="filter-multi-group" aria-labelledby="materialGroupTitle">
        <div class="filter-chip-group-head">
          <strong id="materialGroupTitle">Material</strong>
          <span id="materialGroupMeta">Todos</span>
        </div>
        <div class="filter-toggle-grid" id="materialFilterChips"></div>
      </section>
      <section class="filter-multi-group" aria-labelledby="colorGroupTitle">
        <div class="filter-chip-group-head">
          <strong id="colorGroupTitle">Color</strong>
          <span id="colorGroupMeta">Todos</span>
        </div>
        <div class="filter-toggle-grid" id="colorFilterChips"></div>
      </section>
      <section class="saved-filter-box" aria-labelledby="savedFiltersTitle">
        <div class="filter-chip-group-head">
          <strong id="savedFiltersTitle">Favoritos</strong>
          <button id="saveCurrentFilters" class="save-filter-button" type="button">Guardar actual</button>
        </div>
        <p class="price-filter-note">Guarda combinaciones de búsqueda, filtros y orden para reutilizarlas.</p>
        <div class="saved-filters-list" id="savedFiltersList"></div>
      </section>
    </aside>
    <div class="catalog-content">
      <section class="catalog-results-bar" aria-live="polite">
        <div class="catalog-results-copy">
          <strong id="resultSummary">Cargando catálogo...</strong>
          <span id="resultHint">Usa la búsqueda, los selectores o los atajos para refinar el catálogo.</span>
        </div>
        <div class="catalog-results-actions">
          <button id="resultsFilterToggle" class="results-filter-button" type="button" aria-expanded="false" aria-controls="filterPanel">Abrir filtros</button>
        </div>
        <div class="active-filters" id="activeFilters" hidden></div>
      </section>
      <main id="grid" aria-live="polite"></main>
    </div>
  </section>
  <script src="/app.js?v=20260708-cleanup" defer></script>
</body>
</html>
