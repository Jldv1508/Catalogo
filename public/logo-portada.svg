<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" role="img" aria-labelledby="title desc">
  <title id="title">Logo jldv1508</title>
  <desc id="desc">Logo con las siglas JL arriba, 15 a la izquierda, 08 a la derecha y DV abajo sobre una cruz blanca.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1631"/>
      <stop offset="100%" stop-color="#08101e"/>
    </linearGradient>
    <filter id="blur-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="768" height="768" fill="url(#bg)"/>
  <circle cx="384" cy="384" r="360" fill="#12326b" opacity=".16"/>

  <g filter="url(#blur-lg)" opacity=".95">
    <ellipse cx="250" cy="338" rx="168" ry="44" transform="rotate(-28 250 338)" fill="#ff587d"/>
    <ellipse cx="312" cy="350" rx="210" ry="34" transform="rotate(-28 312 350)" fill="#ffd861"/>
    <ellipse cx="392" cy="384" rx="240" ry="28" transform="rotate(-28 392 384)" fill="#8df3ff"/>
    <ellipse cx="462" cy="430" rx="216" ry="34" transform="rotate(-28 462 430)" fill="#6fa6ff"/>
    <ellipse cx="520" cy="482" rx="182" ry="36" transform="rotate(-28 520 482)" fill="#ff5d95"/>
  </g>

  <g stroke="#f4f4f2" stroke-width="18" stroke-linecap="square" opacity=".98">
    <line x1="24" y1="24" x2="744" y2="744"/>
    <line x1="744" y1="24" x2="24" y2="744"/>
  </g>

  <g fill="#f5f3ef" filter="url(#soft-shadow)">
    <text x="384" y="178" text-anchor="middle" font-size="168" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700">JL</text>
    <text x="138" y="464" text-anchor="middle" font-size="188" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700">15</text>
    <text x="630" y="464" text-anchor="middle" font-size="188" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700">08</text>
    <text x="384" y="698" text-anchor="middle" font-size="168" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700">DV</text>
  </g>
</svg>
