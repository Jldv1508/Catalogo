<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portada · jldv1508</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(255,255,255,.12), transparent 28%), #0f1422;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .cover-stage {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 20px 16px;
      text-align: center;
    }
    .cover-header,
    .cover-footer {
      display: grid;
      justify-items: center;
    }
    .cover-header {
      margin-bottom: 8px;
    }
    .cover-footer {
      margin-top: 12px;
    }
    .cover-brand {
      margin: 0;
      color: #fff;
      text-decoration: none;
      font: 700 clamp(34px, 8vw, 72px)/1.05 Georgia, serif;
      letter-spacing: .02em;
    }
    .cover-logo {
      width: min(54vw, 260px);
      aspect-ratio: 1;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.28));
    }
    .cover-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .cover-actions a {
      min-width: 132px;
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      padding: 0 16px;
      border-radius: 999px;
      background: #fff;
      color: #111;
      text-decoration: none;
      font: 900 12px/1 Inter, system-ui, sans-serif;
      text-transform: uppercase;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.25);
    }
    .cover-actions a:last-child {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.24);
    }
  </style>
</head>
<body>
  <main class="cover-stage">
    <div class="cover-header">
      <a class="cover-brand" href="/" aria-label="jldv1508">jldv1508</a>
    </div>
    <img class="cover-logo" src="/logo-portada.svg" alt="Logo jldv1508">
    <div class="cover-footer">
      <div class="cover-actions" aria-label="Acciones de portada">
        <a href="/catalogo">Empezar</a>
        <a href="/edicion" aria-label="Abrir edicion">...</a>
      </div>
    </div>
  </main>
</body>
</html>
